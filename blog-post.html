</head>
<body>

  <a href="index.html" class="pg-brand"><img src="assets/logos/logo-full.png" alt="תיכון החממה" /><span>חממה</span></a>
  <button class="pg-burger" aria-label="תפריט" aria-expanded="false">☰</button>
  <nav class="pg-nav" aria-label="ניווט ראשי">

    <a href="learning.html">איך לומדים כאן</a>

<main>
  <section class="pg-section">
    <div class="pg-wrap" id="post-container">
      <div style="text-align: center; padding: 64px 0;">
        <p class="pg-p">טוען פוסט...</p>
      </div>
    </div>
  </section>
</main>

<footer class="pg-footer">
  <div class="pg-footer__inner">
    <a href="index.html" class="pg-footer__brand"><img src="assets/logos/logo-full.png" alt="תיכון החממה" /><span>תיכון החממה</span></a>
    <nav class="pg-footer__links" aria-label="ניווט תחתון">
      <a href="about.html">מהי החממה</a>
      <a href="learning.html">איך לומדים כאן</a>

      <a href="blog.html">בלוג</a>
      <a href="shop.html">חנות</a>

    </nav>

      <span class="pg-footer__partners">
        <img src="assets/logos/partner-ministry-of-labor.png" alt="משרד העבודה" />
        <img src="assets/logos/partner-amal.png" alt="רשת עמל" />

      </span></p>
  </div>
</footer>

<script src="pages.js"></script>
<script>
  document.addEventListener("DOMContentLoaded", function () {
    const container = document.getElementById("post-container");
    
    // Get slug from URL
    const urlParams = new URLSearchParams(window.location.search);
    const slug = urlParams.get("slug");

    if (!slug) {
      showError("שגיאה: לא נבחר פוסט להצגה.");
      return;
    }

    async function loadPosts() {
      try {
        const response = await fetch("/.netlify/functions/posts");
        if (!response.ok) throw new Error("Function failed");
        return await response.json();
      } catch (error) {
        console.warn("Falling back to local posts.json", error);
        const fallback = await fetch("data/posts.json");
        if (!fallback.ok) throw new Error("Fallback failed");
        return await fallback.json();
      }
    }

    loadPosts()
      .then(posts => {
        const post = posts.find(p => p.slug === slug);

        if (!post) {
          showError("הדף המבוקש לא נמצא. ייתכן שהפוסט הוסר או הועבר.", true);
          return;
        }

        // Set page title
        document.title = `${post.title} — תיכון החממה`;

        const formattedDate = new Date(post.date).toLocaleDateString("he-IL", {
          year: "numeric",
          month: "long",
          day: "numeric"
        });

        const tagsHTML = post.tags && post.tags.length > 0
          ? `<div class="bs-card__tags" style="justify-content: center; margin-top: 12px;">
              ${post.tags.map(tag => `<span class="bs-card__tag" style="font-size: 13.5px; padding: 6px 12px;">${tag}</span>`).join("")}
             </div>`
          : "";

        const imageHTML = post.image 
          ? `<img src="${post.image}" alt="${post.title}" class="post-image-hero" />`
          : "";

        // Format body text paragraphs
        const paragraphs = post.body.split(/\n\n+/);
        const bodyHTML = paragraphs.map(p => `<p class="pg-p" style="font-size: 18px; margin-bottom: 20px;">${p.replace(/\n/g, '<br>')}</p>`).join("");

        container.innerHTML = `
          <a href="blog.html" class="post-back-link">→ חזרה לבלוג וחדשות</a>
          
          <article>
            <header class="post-header" style="text-align: center;">
              <div class="post-meta-details" style="justify-content: center;">
                <span class="bs-card__type">${post.type}</span>
                <span style="opacity: 0.4;">·</span>
                <span class="bs-card__date">${formattedDate}</span>
              </div>
              <h1 class="pg-title" style="margin-inline: auto; text-align: center; max-width: 28ch;">${post.title}</h1>
              ${tagsHTML}
            </header>
            
            ${imageHTML}
            
            <div class="post-body-content">
              ${bodyHTML}
            </div>
          </article>
        `;
      })
      .catch(error => {
        console.error("Error fetching post details:", error);
        showError("אירעה שגיאה בטעינת תוכן הפוסט. אנא נסו שוב.");
      });

    function showError(message, notFound = false) {
      container.innerHTML = `
        <div style="text-align: center; padding: 48px 0;">
          <h2 class="pg-h2" style="color: var(--ch-danger); margin-bottom: 16px;">${notFound ? "הדף לא נמצא" : "שגיאה"}</h2>
          <p class="pg-p" style="margin-bottom: 24px;">${message}</p>
          <a href="blog.html" class="pg-btn">חזרה לבלוג</a>
        </div>
      `;
    }
  });
</script>
</body>
</html>
