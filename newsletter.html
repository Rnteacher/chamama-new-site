<!doctype html>
<html lang="he" dir="rtl">
<head>
<meta charset="utf-8" />
<title>ניוזלטר — תיכון החממה</title>
<meta name="viewport" content="width=device-width, initial-scale=1" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;500;700;900&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="pages.css" />
<link rel="stylesheet" href="blog-shop.css" />
<style>
  /* ──────────────────────────────────────────────────────────
     Newsletter Custom Premium Styles
     ────────────────────────────────────────────────────────── */
  body {
    background: var(--ch-bg);
  }

  /* Utility Control Bar at the top (hidden in print) */
  .nl-control-bar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 16px 24px;
    background: var(--ch-surface);
    border: 2px solid var(--ch-ink);
    box-shadow: 4px 4px 0 var(--ch-ink);
    margin: 32px auto;
    max-width: 800px;
    border-radius: 4px;
  }
  
  .nl-back-link {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    font-weight: 700;
    font-size: 15px;
    color: var(--ch-green-dark);
    text-decoration: none;
  }
  
  .nl-back-link:hover {
    text-decoration: underline;
  }
  
  .nl-actions {
    display: flex;
    gap: 12px;
  }
  
  .nl-actions .pg-btn {
    font-size: 14px;
    padding: 8px 16px;
    font-family: inherit;
  }

  /* Copy Feedback Banner */
  .nl-feedback {
    max-width: 800px;
    margin: -16px auto 24px;
    padding: 12px;
    border-radius: 4px;
    font-weight: 600;
    text-align: center;
    font-size: 14px;
    display: none;
    animation: fadeIn 0.2s ease-in-out;
  }

  /* Standalone Newsletter Envelope */
  .nl-container {
    max-width: 800px;
    margin: 0 auto 60px;
    background: white;
    padding: 48px;
    border: 2px solid var(--ch-ink);
    box-shadow: 6px 6px 0 var(--ch-ink);
    border-radius: 4px;
    transition: all 0.3s ease;
  }

  /* Header Section */
  .nl-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    border-bottom: 3px solid var(--ch-ink);
    padding-bottom: 24px;
    margin-bottom: 32px;
  }
  
  .nl-logo {
    display: block;
    text-decoration: none;
  }
  
  .nl-logo img {
    height: 52px;
    width: auto;
    display: block;
  }
  
  .nl-issue-info {
    text-align: left;
  }
  
  .nl-issue-label {
    font-family: "FbElectron Condensed", "Heebo", sans-serif;
    font-weight: 900;
    font-size: 20px;
    color: var(--ch-green-dark);
    margin-bottom: 4px;
  }
  
  .nl-issue-date {
    font-size: 14px;
    color: var(--ch-ink-soft);
  }

  /* Title & Intro */
  .nl-title {
    font-family: "FbElectron Condensed", "Heebo", sans-serif;
    font-weight: 900;
    font-size: clamp(32px, 5vw, 48px);
    color: var(--ch-ink);
    margin: 0 0 24px;
    line-height: 1.1;
  }
  
  .nl-intro {
    font-size: 17.5px;
    line-height: 1.8;
    color: var(--ch-ink-soft);
    margin-bottom: 40px;
    padding: 20px;
    background: var(--ch-bg-alt);
    border-right: 4px solid var(--ch-green-mid);
    white-space: pre-wrap;
  }

  /* Posts Grid */
  .nl-posts-grid {
    display: flex;
    flex-direction: column;
    gap: 36px;
  }

  /* Base Post Card */
  .nl-post-card {
    background: white;
    border: 1px solid rgba(0, 0, 0, 0.1);
    box-shadow: 4px 4px 0 var(--ch-ink);
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }
  
  .nl-post-img-container {
    position: relative;
    width: 100%;
    height: 280px;
    overflow: hidden;
    background: repeating-linear-gradient(135deg, rgba(0,0,0,0.035) 0 2px, transparent 2px 11px);
  }
  
  .nl-post-img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
  }
  
  .nl-post-body {
    padding: 24px;
    display: flex;
    flex-direction: column;
    flex-grow: 1;
  }
  
  .nl-post-meta {
    font-size: 13.5px;
    color: var(--ch-green-mid);
    font-weight: 700;
    margin-bottom: 8px;
    text-transform: uppercase;
  }
  
  .nl-post-title {
    font-family: "FbElectron Condensed", "Heebo", sans-serif;
    font-weight: 900;
    font-size: 23px;
    margin: 0 0 12px;
    color: var(--ch-ink);
    line-height: 1.25;
  }
  
  .nl-post-excerpt {
    font-size: 16px;
    line-height: 1.65;
    color: var(--ch-ink-soft);
    margin-bottom: 20px;
    flex-grow: 1;
  }
  
  .nl-post-link {
    align-self: flex-start;
    font-weight: 700;
    font-size: 15px;
    color: var(--ch-green-dark);
    text-decoration: underline;
  }

  /* Footer */
  .nl-footer {
    border-top: 3px solid var(--ch-ink);
    padding-top: 32px;
    margin-top: 56px;
    text-align: center;
  }
  
  .nl-footer-partners {
    display: flex;
    justify-content: center;
    flex-wrap: wrap;
    gap: 14px;
    margin-bottom: 24px;
  }
  
  .nl-footer-partners img {
    height: 32px;
    width: auto;
    background: white;
    border: 1px solid rgba(0, 0, 0, 0.1);
    border-radius: 4px;
    padding: 4px 8px;
  }
  
  .nl-footer-info {
    font-size: 13.5px;
    color: var(--ch-ink-soft);
    line-height: 1.6;
  }

  /* Loading & Error States */
  .nl-status-container {
    max-width: 600px;
    margin: 80px auto;
    text-align: center;
    background: var(--ch-surface);
    border: 2px solid var(--ch-ink);
    box-shadow: 4px 4px 0 var(--ch-ink);
    padding: 48px;
  }

  /* ──────────────────────────────────────────────────────────
     Template Customizations
     ────────────────────────────────────────────────────────── */

  /* ─── 1. MAGAZINE TEMPLATE ─── */
  .template-magazine .nl-posts-grid {
    display: grid;
    grid-template-columns: 1fr;
    gap: 32px;
  }
  
  /* Featured large first post */
  .template-magazine .featured-post {
    display: grid;
    grid-template-columns: 1.2fr 1fr;
    min-height: 360px;
  }
  
  .template-magazine .featured-post .nl-post-img-container {
    height: 100%;
    min-height: 300px;
  }
  
  .template-magazine .featured-post .nl-post-title {
    font-size: 28px;
  }
  
  /* Remaining posts layout in sub-grid cards */
  .template-magazine .nl-posts-subgrid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
    gap: 24px;
  }
  
  @media (max-width: 768px) {
    .template-magazine .featured-post {
      grid-template-columns: 1fr;
    }
    .template-magazine .featured-post .nl-post-img-container {
      height: 220px;
      min-height: auto;
    }
  }

  /* ─── 2. POSTER TEMPLATE (Bold Event Style) ─── */
  .template-poster .nl-container {
    background: var(--ch-green-dark);
    color: #fbf8f1;
    border-color: var(--ch-green-neon);
    box-shadow: 6px 6px 0 var(--ch-green-neon);
  }
  
  .template-poster .nl-header {
    border-bottom-color: var(--ch-green-neon);
  }
  
  .template-poster .nl-logo img {
    filter: brightness(0) invert(1);
  }
  
  .template-poster .nl-issue-label {
    color: var(--ch-green-neon);
  }
  
  .template-poster .nl-issue-date {
    color: rgba(251, 248, 241, 0.7);
  }
  
  .template-poster .nl-title {
    color: var(--ch-green-neon);
    font-size: clamp(38px, 6vw, 56px);
  }
  
  .template-poster .nl-intro {
    background: rgba(255, 255, 255, 0.06);
    border-right-color: var(--ch-green-neon);
    color: #fbf8f1;
  }
  
  .template-poster .nl-post-card {
    background: rgba(255, 255, 255, 0.04);
    border-color: rgba(255, 255, 255, 0.15);
    box-shadow: 4px 4px 0 var(--ch-green-neon);
    color: #fbf8f1;
  }
  
  .template-poster .nl-post-title {
    color: var(--ch-green-neon);
  }
  
  .template-poster .nl-post-excerpt {
    color: rgba(251, 248, 241, 0.85);
  }
  
  .template-poster .nl-post-link {
    color: var(--ch-green-neon);
  }
  
  .template-poster .nl-footer {
    border-top-color: var(--ch-green-neon);
  }
  
  .template-poster .nl-footer-info {
    color: rgba(251, 248, 241, 0.7);
  }

  /* ─── 3. COMPACT TEMPLATE (Print-Friendly Digest) ─── */
  .template-compact .nl-container {
    max-width: 680px;
    padding: 24px 32px;
  }
  
  .template-compact .nl-header {
    padding-bottom: 12px;
    margin-bottom: 20px;
  }
  
  .template-compact .nl-title {
    font-size: 30px;
    margin-bottom: 16px;
  }
  
  .template-compact .nl-intro {
    padding: 14px;
    font-size: 15px;
    margin-bottom: 24px;
  }
  
  .template-compact .nl-posts-grid {
    gap: 20px;
  }
  
  .template-compact .nl-post-card {
    display: grid;
    grid-template-columns: 140px 1fr;
    box-shadow: 2px 2px 0 var(--ch-ink);
  }
  
  .template-compact .nl-post-img-container {
    height: 100%;
    min-height: 120px;
  }
  
  .template-compact .nl-post-body {
    padding: 16px;
  }
  
  .template-compact .nl-post-title {
    font-size: 18px;
    margin-bottom: 6px;
  }
  
  .template-compact .nl-post-excerpt {
    font-size: 14px;
    margin-bottom: 8px;
    line-height: 1.5;
  }
  
  .template-compact .nl-footer {
    margin-top: 32px;
    padding-top: 24px;
  }
  
  .template-compact .nl-footer-partners {
    margin-bottom: 16px;
  }
  
  .template-compact .nl-footer-partners img {
    height: 26px;
  }

  @media (max-width: 540px) {
    .template-compact .nl-post-card {
      grid-template-columns: 1fr;
    }
    .template-compact .nl-post-img-container {
      height: 160px;
    }
  }

  /* ──────────────────────────────────────────────────────────
     Print Media Queries Optimization
     ────────────────────────────────────────────────────────── */
  @media print {
    body {
      background: white !important;
      color: black !important;
    }
    
    .no-print {
      display: none !important;
    }
    
    .nl-container {
      max-width: 100% !important;
      width: 100% !important;
      border: none !important;
      box-shadow: none !important;
      padding: 0 !important;
      margin: 0 !important;
      background: white !important;
      color: black !important;
    }
    
    .nl-post-card {
      page-break-inside: avoid;
      break-inside: avoid;
      box-shadow: none !important;
      border: 1px solid #ddd !important;
      background: white !important;
      color: black !important;
    }

    .template-poster .nl-container,
    .template-poster .nl-post-card {
      background: white !important;
      color: black !important;
      border: 1px solid #333 !important;
      box-shadow: none !important;
    }

    .template-poster .nl-title,
    .template-poster .nl-issue-label,
    .template-poster .nl-post-title,
    .template-poster .nl-post-link {
      color: #1e3a34 !important;
    }

    .template-poster .nl-logo img {
      filter: none !important;
    }

    .template-poster .nl-intro {
      background: #f4f0e7 !important;
      color: black !important;
      border-right-color: #1e3a34 !important;
    }

    .template-poster .nl-issue-date,
    .template-poster .nl-post-excerpt,
    .template-poster .nl-footer-info {
      color: #333 !important;
    }

    /* Print color adjust setup */
    * {
      -webkit-print-color-adjust: exact !important;
      print-color-adjust: exact !important;
    }
    
    @page {
      margin: 1.5cm;
    }
  }
</style>
</head>

  <div class="nl-control-bar pg-wrap no-print">

    <!-- Main Title -->
    <h1 class="nl-title" id="nl-val-title"><!-- Dynamic Title --></h1>

        <img src="assets/logos/partner-amal.png" alt="רשת עמל" />

      <div class="nl-footer-info">
        תיכון החממה · עמל הוד השרון · טלפון: 09-7884549 · אימייל: <a href="mailto:info@chamama.org" style="color: var(--ch-green-dark); font-weight: 700;">info@chamama.org</a>
        <br />
        <a href="index.html" class="no-print" style="color: var(--ch-green-dark); text-decoration: underline; font-weight: 600; margin-top: 8px; display: inline-block;">ביקור באתר בית הספר</a>
      </div>
    </footer>

  </article>

<script src="pages.js"></script>
<script>
  document.addEventListener("DOMContentLoaded", function () {
    const statusContainer = document.getElementById("nl-status");
    const statusTitle = document.getElementById("status-title");
    const statusText = document.getElementById("status-text");
    const contentContainer = document.getElementById("nl-content");
    
    const lblIssue = document.getElementById("nl-lbl-issue");
    const lblDate = document.getElementById("nl-lbl-date");
    const valTitle = document.getElementById("nl-val-title");
    const valIntro = document.getElementById("nl-val-intro");
    const postsGridContainer = document.getElementById("nl-posts-grid-container");

    const feedbackBanner = document.getElementById("nl-feedback-banner");

    // Extract newsletter ID from query
    const urlParams = new URLSearchParams(window.location.search);
    const newsletterId = urlParams.get("id");

    if (!newsletterId) {
      showError("הניוזלטר אינו קיים", "לא סופק מזהה ניוזלטר (id) בכתובת הדף. אנא ודאו שהקישור שקיבלתם תקין.");
      return;
    }

    // Safety escaping helpers
    function escapeHTML(str) {
      if (typeof str !== 'string') {
        return str === undefined || str === null ? '' : String(str);
      }
      return str
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#039;');
    }

    function safeURL(url) {
      if (typeof url !== 'string') {
        url = url === undefined || url === null ? '' : String(url);
      }
      const trimmed = url.trim();
      if (trimmed.toLowerCase().startsWith('javascript:') || trimmed.toLowerCase().startsWith('data:')) {
        return '';
      }
      return escapeHTML(trimmed);
    }

    function showError(title, message) {
      statusTitle.textContent = title;
      statusTitle.style.color = "var(--ch-danger)";
      statusText.textContent = message;
      statusContainer.style.display = "block";
      contentContainer.style.display = "none";
    }

    function showBannerFeedback(message, isSuccess = true) {
      feedbackBanner.textContent = message;
      feedbackBanner.style.display = "block";
      if (isSuccess) {
        feedbackBanner.style.backgroundColor = "rgba(34, 197, 94, 0.15)";
        feedbackBanner.style.color = "#15803d";
        feedbackBanner.style.border = "1px solid #bbf7d0";
      } else {
        feedbackBanner.style.backgroundColor = "#fde8e8";
        feedbackBanner.style.color = "#c81e1e";
        feedbackBanner.style.border = "1px solid #fecaca";
      }
      setTimeout(() => {
        feedbackBanner.style.display = "none";
      }, 5000);
    }

    // Data loading functions
    async function loadNewsletters() {
      try {
        const response = await fetch("/.netlify/functions/newsletters");
        if (!response.ok) throw new Error("Function failed");
        return await response.json();
      } catch (error) {
        console.warn("Falling back to local newsletters.json", error);
        const fallback = await fetch("data/newsletters.json");
        if (!fallback.ok) throw new Error("Fallback failed");
        return await fallback.json();
      }
    }

    async function loadPosts() {
      try {
        const response = await fetch("/.netlify/functions/posts");
        if (!response.ok) throw new Error("Function failed");
        return await response.json();
      } catch (error) {
        console.warn("Falling back to local posts.json", error);
        const fallback = await fetch("data/posts.json");
        if (!fallback.ok) throw new Error("Fallback failed");
        return await fallback.json();
      }
    }

    // Load data and compile
    Promise.all([loadNewsletters(), loadPosts()])
      .then(([newsletters, posts]) => {
        const newsletter = newsletters.find(n => n.id === newsletterId && n.published === true);

        if (!newsletter) {
          showError("הניוזלטר לא נמצא", "הגיליון המבוקש לא קיים במערכת או שטרם פורסם לציבור.");
          return;
        }

        // Apply template layout class
        const activeTemplate = ['classic', 'magazine', 'poster', 'compact'].includes(newsletter.template)
          ? newsletter.template
          : 'classic';
        contentContainer.classList.add(`template-${activeTemplate}`);

        // Set document title
        document.title = `${newsletter.title} — ניוזלטר תיכון החממה`;

        // Fill Header & Content Meta
        lblIssue.textContent = newsletter.issue ? escapeHTML(newsletter.issue) : "ניוזלטר";
        
        if (newsletter.date) {
          const formattedNLDate = new Date(newsletter.date).toLocaleDateString("he-IL", {
            year: "numeric",
            month: "long",
            day: "numeric"
          });
          lblDate.textContent = formattedNLDate;
        } else {
          lblDate.textContent = "";
        }

        valTitle.textContent = newsletter.title;
        valIntro.textContent = newsletter.intro;

        // Match referenced posts in precise order of post_slugs
        const selectedPosts = [];
        if (newsletter.post_slugs && Array.isArray(newsletter.post_slugs)) {
          newsletter.post_slugs.forEach(slug => {
            const foundPost = posts.find(p => p.slug === slug);
            if (foundPost) {
              selectedPosts.push(foundPost);
            }
          });
        }

        if (selectedPosts.length === 0) {
          postsGridContainer.innerHTML = `<p style="color: #666; font-style: italic; text-align: center; padding: 24px 0;">לא נמצאו עדכונים או כתבות להצגה בגיליון זה.</p>`;
        } else {
          renderPostsLayout(selectedPosts, activeTemplate);
        }

        // Show main content & hide loading state
        statusContainer.style.display = "none";
        contentContainer.style.display = "block";
      })
      .catch(error => {
        console.error("Error building newsletter page:", error);
        showError("שגיאה בטעינת הניוזלטר", "אירעה שגיאה תקשורתית במהלך שחזור נתוני הניוזלטר. אנא נסו לרענן את הדף.");
      });

    // Helper to generate post card markup
    function buildPostMarkup(post, isFeatured = false) {
      const formattedDate = new Date(post.date).toLocaleDateString("he-IL", {
        year: "numeric",
        month: "long",
        day: "numeric"
      });
      
      const postUrl = `blog-post.html?slug=${safeURL(post.slug)}`;
      const typeHebrew = post.type === 'event' || post.type === 'אירוע' ? 'אירוע' : 'מאמר';
      const imageSrc = post.image ? safeURL(post.image) : "assets/uploads/learn-project.webp";

      return `
        <div class="nl-post-card ${isFeatured ? 'featured-post' : ''}">
          <div class="nl-post-img-container">
            <img src="${imageSrc}" alt="${escapeHTML(post.title)}" class="nl-post-img" loading="lazy" />
          </div>
          <div class="nl-post-body">
            <div class="nl-post-meta">${escapeHTML(typeHebrew)} · ${formattedDate}</div>
            <h3 class="nl-post-title">${escapeHTML(post.title)}</h3>
            <p class="nl-post-excerpt">${escapeHTML(post.excerpt)}</p>
            <a href="${postUrl}" class="nl-post-link" target="_blank">קראו עוד באתר ←</a>
          </div>
        </div>
      `;
    }

    // Template specific layout compilation
    function renderPostsLayout(selectedPosts, template) {
      if (template === 'magazine') {
        // First post is featured
        const firstPost = selectedPosts[0];
        const remainingPosts = selectedPosts.slice(1);
        
        let htmlContent = buildPostMarkup(firstPost, true);
        
        if (remainingPosts.length > 0) {
          htmlContent += `
            <div class="nl-posts-subgrid">
              ${remainingPosts.map(p => buildPostMarkup(p, false)).join("")}
            </div>
          `;
        }
        postsGridContainer.innerHTML = htmlContent;
      } else {
        // classic, poster, compact all share a vertical flow with styling customized in CSS
        postsGridContainer.innerHTML = selectedPosts.map(p => buildPostMarkup(p, false)).join("");
      }
    }

    // Sharing action listeners
    document.getElementById("btn-copy-link").addEventListener("click", function () {
      const currentUrl = window.location.href;
      navigator.clipboard.writeText(currentUrl)
        .then(() => {
          showBannerFeedback("הקישור הישיר לניוזלטר הועתק ללוח! כעת תוכלו לשתף אותו.");
        })
        .catch(err => {
          console.error("Failed to copy link:", err);
          showBannerFeedback("שגיאה בהעתקת הקישור. אנא העתיקו ידנית משורת הכתובת.", false);
        });
    });

    document.getElementById("btn-copy-email").addEventListener("click", function () {
      const currentUrl = window.location.href;
      const emailTemplateText = `שלום,
הניוזלטר החדש של תיכון החממה זמין לקריאה כאן:
${currentUrl}

קריאה נעימה,
תיכון החממה`;

      navigator.clipboard.writeText(emailTemplateText)
        .then(() => {
          showBannerFeedback("טקסט המייל הקצר הועתק ללוח! מוכן להדבקה במערכת הדיוור או בגוף המייל.");
        })
        .catch(err => {
          console.error("Failed to copy email text:", err);
          showBannerFeedback("שגיאה בהעתקת טקסט המייל.", false);
        });
    });

    document.getElementById("btn-print").addEventListener("click", function () {
      window.print();
    });
  });
</script>
</body>
</html>
