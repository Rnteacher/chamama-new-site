<!doctype html>
<html lang="he" dir="rtl">
<head>
<meta charset="utf-8" />
<title>ניוזלטר — תיכון החממה</title>
<meta name="viewport" content="width=device-width, initial-scale=1" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Frank+Ruhl+Libre:wght@500;700;800;900&family=Heebo:wght@300;400;500;700;900&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="pages.css" />
<link rel="stylesheet" href="blog-shop.css" />
<style>
  /* ──────────────────────────────────────────────────────────
     Newsletter — Digital magazine page for תיכון החממה
     Four templates with distinct identities:
       classic  → editorial   (קלאסי־מערכתי)
       magazine → magazine     (מגזיני)
       poster   → chamama zine (חממתי)
       compact  → print edition(גרסת הדפסה)
     ────────────────────────────────────────────────────────── */

  :root {
    --nl-paper:     #FBF8F1;
    --nl-cream:     #F4F0E7;
    --nl-ink:       #171717;
    --nl-ink-soft:  #4a4a4a;
    --nl-green:     #244C42;
    --nl-green-mid: #4E7B68;
    --nl-neon:      #7CFF4F;
    --nl-sand:      #D8CFBF;
    --nl-line:      rgba(23, 23, 23, 0.12);

    --nl-serif:   "Frank Ruhl Libre", "Heebo", Georgia, serif;
    --nl-display: "FbElectron Condensed", "Heebo", sans-serif;
    --nl-sans:    "Heebo", system-ui, sans-serif;
  }

  body { background: var(--nl-cream); }

  img { max-width: 100%; }

  /* ─── Top bar (slim back-link, never printed) ─── */
  .nl-topbar {
    max-width: 880px;
    margin: 22px auto 0;
    padding: 0 24px;
  }
  .nl-back-link {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    font-family: var(--nl-sans);
    font-weight: 700;
    font-size: 14px;
    color: var(--nl-green);
    text-decoration: none;
  }
  .nl-back-link:hover { text-decoration: underline; }

  /* ─── The newsletter "sheet" ─── */
  .nl-container {
    max-width: 880px;
    margin: 20px auto 72px;
    background: var(--nl-paper);
    padding: clamp(28px, 5vw, 64px);
    border: 1px solid var(--nl-line);
    border-radius: 3px;
    box-shadow: 0 1px 2px rgba(0,0,0,0.04), 0 14px 44px rgba(0,0,0,0.07);
  }

  /* ─── Shared masthead ─── */
  .nl-masthead {
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 16px;
    padding-bottom: 20px;
    margin-bottom: 30px;
    border-bottom: 1px solid var(--nl-line);
  }
  .nl-logo { display: block; text-decoration: none; }
  .nl-logo img { height: 50px; width: auto; display: block; }
  .nl-issue {
    text-align: left;
    display: flex;
    flex-direction: column;
    gap: 2px;
  }
  .nl-issue__label {
    font-family: var(--nl-display);
    font-weight: 900;
    font-size: 18px;
    color: var(--nl-green);
    letter-spacing: 0.02em;
  }
  .nl-issue__date {
    font-family: var(--nl-sans);
    font-size: 13px;
    color: var(--nl-ink-soft);
  }

  /* ─── Shared title + intro ─── */
  .nl-title {
    font-family: var(--nl-display);
    font-weight: 900;
    font-size: clamp(30px, 5vw, 46px);
    line-height: 1.1;
    color: var(--nl-ink);
    margin: 0 0 20px;
  }
  .nl-intro {
    font-family: var(--nl-sans);
    font-size: 17px;
    line-height: 1.8;
    color: var(--nl-ink-soft);
    margin: 0 0 40px;
    white-space: pre-wrap;
  }

  /* ─── Shared media fallback (no broken-image icon) ─── */
  .nl-art__media, .nl-mag-card__media, .nl-zine__media,
  .nl-digest__media, .nl-hero__media {
    background-color: #e9e4d7;
    background-image: repeating-linear-gradient(135deg,
      rgba(23,23,23,0.04) 0 2px, transparent 2px 12px);
    overflow: hidden;
  }

  /* ─── Bottom print row (never printed) ─── */
  .nl-print-row {
    text-align: center;
    margin-top: 52px;
  }
  .nl-print-btn {
    font-family: var(--nl-sans);
    font-weight: 700;
    font-size: 15px;
    color: #fff;
    background: var(--nl-green);
    border: 2px solid var(--nl-ink);
    border-radius: 2px;
    padding: 14px 30px;
    cursor: pointer;
    box-shadow: 4px 4px 0 var(--nl-ink);
    transition: transform .14s var(--ease-out, ease), box-shadow .14s var(--ease-out, ease);
  }
  .nl-print-btn:hover { transform: translate(-1px,-1px); box-shadow: 5px 5px 0 var(--nl-ink); }
  .nl-print-btn:active { transform: translate(2px,2px); box-shadow: 1px 1px 0 var(--nl-ink); }

  /* ─── Shared footer ─── */
  .nl-footer {
    margin-top: 48px;
    padding-top: 30px;
    border-top: 1px solid var(--nl-line);
    text-align: center;
  }
  .nl-footer__partners {
    display: flex;
    justify-content: center;
    align-items: center;
    flex-wrap: wrap;
    gap: 14px;
    margin-bottom: 20px;
  }
  .nl-footer__partners img {
    height: 34px;
    width: auto;
    background: #fff;
    border: 1px solid var(--nl-line);
    border-radius: 3px;
    padding: 5px 9px;
  }
  .nl-footer__info {
    font-family: var(--nl-sans);
    font-size: 13px;
    line-height: 1.7;
    color: var(--nl-ink-soft);
  }
  .nl-footer__info a { color: var(--nl-green); font-weight: 700; }

  /* ─── Status (loading / error) ─── */
  .nl-status-container {
    max-width: 560px;
    margin: 80px auto;
    text-align: center;
    background: var(--nl-paper);
    border: 1px solid var(--nl-line);
    box-shadow: 0 12px 40px rgba(0,0,0,0.06);
    border-radius: 4px;
    padding: 48px;
  }

  .nl-empty {
    text-align: center;
    color: var(--nl-ink-soft);
    font-style: italic;
    padding: 28px 0;
  }

  /* ══════════════════════════════════════════════════════════
     TEMPLATE 1 — EDITORIAL  (key: classic)
     A calm, parent-friendly education magazine.
     ══════════════════════════════════════════════════════════ */
  .template-classic .nl-masthead {
    flex-direction: column;
    gap: 12px;
    text-align: center;
    border-bottom: 2px solid var(--nl-ink);
    padding-bottom: 18px;
  }
  .template-classic .nl-issue {
    flex-direction: row;
    align-items: center;
    gap: 10px;
    text-align: center;
  }
  .template-classic .nl-issue__label {
    font-family: var(--nl-sans);
    font-weight: 700;
    font-size: 12px;
    letter-spacing: 0.16em;
    text-transform: uppercase;
    color: var(--nl-green-mid);
  }
  .template-classic .nl-issue__date {
    font-size: 12px;
    letter-spacing: 0.04em;
  }
  .template-classic .nl-title {
    font-family: var(--nl-serif);
    font-weight: 800;
    font-size: clamp(32px, 5.2vw, 48px);
    line-height: 1.15;
    text-align: center;
    max-width: 20ch;
    margin: 14px auto 24px;
  }
  .template-classic .nl-intro {
    font-family: var(--nl-serif);
    font-style: italic;
    font-size: clamp(18px, 2.4vw, 22px);
    line-height: 1.7;
    color: var(--nl-ink);
    text-align: center;
    max-width: 58ch;
    margin: 0 auto 8px;
    padding-bottom: 32px;
    border-bottom: 1px solid var(--nl-line);
    white-space: pre-wrap;
  }
  .template-classic .nl-posts {
    display: flex;
    flex-direction: column;
  }
  .nl-art__rule {
    border: 0;
    border-top: 1px solid var(--nl-line);
    margin: 40px 0;
  }
  .nl-art { display: grid; grid-template-columns: 1fr; gap: 26px; }
  @media (min-width: 700px) {
    .nl-art:not(.nl-art--text) { grid-template-columns: 320px 1fr; align-items: center; }
    .nl-art--flip:not(.nl-art--text) { grid-template-columns: 1fr 320px; }
    .nl-art--flip:not(.nl-art--text) .nl-art__media { order: 2; }
  }
  .nl-art__media { aspect-ratio: 4 / 3; border-radius: 2px; }
  .nl-art__img { width: 100%; height: 100%; object-fit: cover; display: block; }
  .nl-art__meta {
    display: flex;
    gap: 8px;
    font-family: var(--nl-sans);
    font-size: 12px;
    font-weight: 700;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--nl-green-mid);
    margin-bottom: 10px;
  }
  .nl-art__title {
    font-family: var(--nl-serif);
    font-weight: 800;
    font-size: clamp(22px, 3vw, 27px);
    line-height: 1.22;
    color: var(--nl-ink);
    margin: 0 0 12px;
  }
  .nl-art__excerpt {
    font-family: var(--nl-sans);
    font-size: 16.5px;
    line-height: 1.75;
    color: var(--nl-ink-soft);
    margin: 0 0 16px;
  }
  .nl-art__link {
    font-family: var(--nl-sans);
    font-weight: 700;
    font-size: 15px;
    color: var(--nl-green);
    text-decoration: none;
    border-bottom: 2px solid var(--nl-neon);
    padding-bottom: 1px;
  }
  .nl-art__link:hover { border-bottom-color: var(--nl-green); }

  /* ══════════════════════════════════════════════════════════
     TEMPLATE 2 — MAGAZINE  (key: magazine)
     A visual digital issue: hero feature + editorial grid.
     ══════════════════════════════════════════════════════════ */
  .template-magazine .nl-masthead {
    border-bottom: 3px solid var(--nl-ink);
  }
  .template-magazine .nl-issue__label { color: var(--nl-green); }
  .template-magazine .nl-intro {
    font-size: 18px;
    border-inline-start: 4px solid var(--nl-green-mid);
    padding-inline-start: 18px;
  }

  .nl-hero {
    position: relative;
    overflow: hidden;
    border: 2px solid var(--nl-ink);
    box-shadow: 7px 7px 0 var(--nl-ink);
    background: var(--nl-green);
    margin-bottom: 34px;
  }
  .nl-hero__media { aspect-ratio: 16 / 9; }
  .nl-hero__img { width: 100%; height: 100%; object-fit: cover; display: block; }
  .nl-hero__panel {
    position: absolute;
    inset-block-end: 0;
    inset-inline: 0;
    padding: clamp(20px, 4vw, 38px);
    background: linear-gradient(to top, rgba(15,28,23,0.93) 0%, rgba(15,28,23,0.55) 55%, rgba(15,28,23,0) 100%);
    color: #fff;
  }
  .nl-hero--text .nl-hero__panel { position: static; background: var(--nl-green); }
  .nl-hero__kicker {
    display: inline-block;
    font-family: var(--nl-display);
    font-weight: 900;
    font-size: 13px;
    letter-spacing: 0.06em;
    color: var(--nl-ink);
    background: var(--nl-neon);
    padding: 4px 12px;
    margin-bottom: 14px;
  }
  .nl-hero__title {
    font-family: var(--nl-display);
    font-weight: 900;
    font-size: clamp(26px, 4.4vw, 42px);
    line-height: 1.08;
    color: #fff;
    margin: 0 0 10px;
  }
  .nl-hero__meta {
    font-family: var(--nl-sans);
    font-size: 13px;
    color: rgba(255,255,255,0.82);
    margin-bottom: 12px;
  }
  .nl-hero__excerpt {
    font-family: var(--nl-sans);
    font-size: 16px;
    line-height: 1.65;
    color: rgba(255,255,255,0.94);
    max-width: 62ch;
    margin: 0 0 16px;
  }
  .nl-hero__link {
    font-family: var(--nl-sans);
    font-weight: 700;
    font-size: 15px;
    color: var(--nl-neon);
    text-decoration: none;
  }
  .nl-hero__link:hover { text-decoration: underline; }

  .nl-mag-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
    gap: 24px;
  }
  .nl-mag-card {
    display: flex;
    flex-direction: column;
    background: #fff;
    border: 1.5px solid var(--nl-line);
    box-shadow: 4px 4px 0 var(--nl-ink);
  }
  .nl-mag-card__media { aspect-ratio: 16 / 10; }
  .nl-mag-card__img { width: 100%; height: 100%; object-fit: cover; display: block; }
  .nl-mag-card__body {
    padding: 18px 18px 20px;
    display: flex;
    flex-direction: column;
    flex: 1;
  }
  .nl-mag-card__meta {
    font-family: var(--nl-sans);
    font-size: 12px;
    font-weight: 700;
    letter-spacing: 0.04em;
    text-transform: uppercase;
    color: var(--nl-green-mid);
    margin-bottom: 8px;
  }
  .nl-mag-card__title {
    font-family: var(--nl-display);
    font-weight: 900;
    font-size: 20px;
    line-height: 1.2;
    color: var(--nl-ink);
    margin: 0 0 10px;
  }
  .nl-mag-card__excerpt {
    font-family: var(--nl-sans);
    font-size: 14.5px;
    line-height: 1.6;
    color: var(--nl-ink-soft);
    margin: 0 0 14px;
    flex: 1;
  }
  .nl-mag-card__link {
    font-family: var(--nl-sans);
    font-weight: 700;
    font-size: 14px;
    color: var(--nl-green);
    text-decoration: none;
    align-self: flex-start;
  }
  .nl-mag-card__link:hover { text-decoration: underline; }

  /* ══════════════════════════════════════════════════════════
     TEMPLATE 3 — CHAMAMA / זין  (key: poster)
     Warm, creative, project-based. Paper + bold blocks + stickers.
     ══════════════════════════════════════════════════════════ */
  .template-poster .nl-container {
    background:
      radial-gradient(circle at 18% 8%, rgba(124,255,79,0.07), transparent 42%),
      repeating-linear-gradient(0deg, rgba(23,23,23,0.018) 0 1px, transparent 1px 5px),
      var(--nl-cream);
    border: 2px solid var(--nl-ink);
    box-shadow: 9px 9px 0 var(--nl-ink);
  }
  .template-poster .nl-masthead {
    border-bottom: 3px solid var(--nl-ink);
  }
  .template-poster .nl-issue__label {
    color: var(--nl-ink);
    background: var(--nl-neon);
    padding: 2px 10px;
    border: 2px solid var(--nl-ink);
  }
  .template-poster .nl-title {
    font-size: clamp(34px, 6vw, 56px);
  }
  .template-poster .nl-intro {
    font-family: var(--nl-sans);
    font-weight: 500;
    font-size: 16.5px;
    color: #fff;
    background: var(--nl-green);
    border: 2px solid var(--nl-ink);
    box-shadow: 5px 5px 0 var(--nl-neon);
    padding: 22px 24px;
    border-radius: 2px;
  }
  .template-poster .nl-posts {
    display: flex;
    flex-direction: column;
    gap: 40px;
  }
  .nl-zine {
    position: relative;
    display: grid;
    grid-template-columns: 1fr;
    background: var(--nl-paper);
    border: 2px solid var(--nl-ink);
    box-shadow: 6px 6px 0 var(--nl-green);
    overflow: hidden;
  }
  @media (min-width: 660px) {
    .nl-zine { grid-template-columns: minmax(0, 1.05fr) 1fr; }
    .nl-zine:nth-child(even) .nl-zine__media { order: 2; }
  }
  .nl-zine--text { grid-template-columns: 1fr; }
  .nl-zine__num {
    position: absolute;
    top: -6px;
    inset-inline-start: -2px;
    z-index: 3;
    font-family: var(--nl-display);
    font-weight: 900;
    font-size: 38px;
    line-height: 1;
    color: var(--nl-green);
    background: var(--nl-neon);
    border: 2px solid var(--nl-ink);
    padding: 6px 12px;
    box-shadow: 3px 3px 0 var(--nl-ink);
  }
  .nl-zine__media { position: relative; aspect-ratio: 4 / 3; }
  .nl-zine__img { width: 100%; height: 100%; object-fit: cover; display: block; }
  .nl-zine__tag {
    position: absolute;
    bottom: 12px;
    inset-inline-end: 12px;
    transform: rotate(-3deg);
    font-family: var(--nl-display);
    font-weight: 900;
    font-size: 14px;
    color: var(--nl-neon);
    background: var(--nl-ink);
    padding: 4px 12px;
    box-shadow: 2px 2px 0 rgba(0,0,0,0.25);
  }
  .nl-zine__tagrow { padding: 22px 26px 0; }
  .nl-zine__tag--static {
    position: static;
    display: inline-block;
    transform: rotate(-2deg);
  }
  .nl-zine__body {
    padding: 30px 26px 26px;
    display: flex;
    flex-direction: column;
  }
  .nl-zine__date {
    font-family: var(--nl-sans);
    font-size: 12px;
    font-weight: 700;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--nl-green-mid);
    margin-bottom: 8px;
  }
  .nl-zine__title {
    font-family: var(--nl-display);
    font-weight: 900;
    font-size: clamp(22px, 3vw, 27px);
    line-height: 1.15;
    color: var(--nl-ink);
    margin: 0 0 12px;
  }
  .nl-zine__excerpt {
    font-family: var(--nl-sans);
    font-size: 15.5px;
    line-height: 1.65;
    color: var(--nl-ink-soft);
    margin: 0 0 20px;
  }
  .nl-zine__link {
    align-self: flex-start;
    font-family: var(--nl-display);
    font-weight: 900;
    font-size: 15px;
    color: var(--nl-green);
    background: var(--nl-neon);
    border: 2px solid var(--nl-ink);
    padding: 8px 16px;
    text-decoration: none;
    box-shadow: 3px 3px 0 var(--nl-ink);
    transition: transform .14s ease, box-shadow .14s ease;
  }
  .nl-zine__link:hover { transform: translate(-1px,-1px); box-shadow: 4px 4px 0 var(--nl-ink); }

  /* ══════════════════════════════════════════════════════════
     TEMPLATE 4 — PRINT EDITION  (key: compact)
     A4-like column, restrained, optimized for Save-as-PDF.
     ══════════════════════════════════════════════════════════ */
  .template-compact .nl-container {
    max-width: 760px;
    background: #fff;
    padding: clamp(24px, 4vw, 46px);
    box-shadow: 0 1px 2px rgba(0,0,0,0.05), 0 8px 30px rgba(0,0,0,0.05);
  }
  .template-compact .nl-masthead {
    padding-bottom: 14px;
    margin-bottom: 22px;
  }
  .template-compact .nl-logo img { height: 42px; }
  .template-compact .nl-title {
    font-family: var(--nl-display);
    font-size: clamp(26px, 4vw, 34px);
    margin-bottom: 14px;
  }
  .template-compact .nl-intro {
    font-size: 15px;
    line-height: 1.7;
    margin-bottom: 26px;
    border-inline-start: 3px solid var(--nl-green-mid);
    padding-inline-start: 14px;
  }
  .template-compact .nl-posts {
    display: flex;
    flex-direction: column;
  }
  .nl-digest {
    display: grid;
    grid-template-columns: 150px 1fr;
    gap: 18px;
    padding: 18px 0;
    border-bottom: 1px solid var(--nl-line);
  }
  .nl-digest--text { grid-template-columns: 1fr; }
  .nl-digest__media {
    aspect-ratio: 4 / 3;
    border: 1px solid var(--nl-line);
    border-radius: 2px;
  }
  .nl-digest__img { width: 100%; height: 100%; object-fit: cover; display: block; }
  .nl-digest__meta {
    font-family: var(--nl-sans);
    font-size: 11.5px;
    font-weight: 700;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    color: var(--nl-green-mid);
    margin-bottom: 5px;
  }
  .nl-digest__title {
    font-family: var(--nl-sans);
    font-weight: 800;
    font-size: 18px;
    line-height: 1.25;
    color: var(--nl-ink);
    margin: 0 0 6px;
  }
  .nl-digest__excerpt {
    font-family: var(--nl-sans);
    font-size: 14px;
    line-height: 1.55;
    color: var(--nl-ink-soft);
    margin: 0 0 6px;
  }
  .nl-digest__link {
    font-family: var(--nl-sans);
    font-size: 13px;
    font-weight: 700;
    color: var(--nl-green);
    text-decoration: none;
  }
  @media (max-width: 520px) {
    .nl-digest { grid-template-columns: 1fr; }
  }

  /* ══════════════════════════════════════════════════════════
     PRINT  — works for every template, best for compact
     ══════════════════════════════════════════════════════════ */
  @media print {
    @page { margin: 1.4cm; }

    * {
      -webkit-print-color-adjust: exact !important;
      print-color-adjust: exact !important;
    }

    html, body { background: #fff !important; }

    /* Hide every screen-only control */
    .no-print,
    .nl-topbar,
    .nl-print-row { display: none !important; }

    .nl-container {
      max-width: 100% !important;
      width: 100% !important;
      margin: 0 !important;
      padding: 0 !important;
      border: 0 !important;
      border-radius: 0 !important;
      box-shadow: none !important;
      background: #fff !important;
    }

    /* Keep meaningful blocks intact on the page */
    .nl-masthead,
    .nl-footer { break-inside: avoid; page-break-inside: avoid; }

    .nl-art,
    .nl-mag-card,
    .nl-zine,
    .nl-digest,
    .nl-hero {
      break-inside: avoid;
      page-break-inside: avoid;
      box-shadow: none !important;
    }

    /* Never split a title from its body */
    .nl-art__title,
    .nl-mag-card__title,
    .nl-zine__title,
    .nl-digest__title,
    .nl-hero__title {
      break-after: avoid;
      page-break-after: avoid;
    }

    img { max-width: 100% !important; }

    /* Chamama: drop the heavy ink shadows, keep it legible in print */
    .template-poster .nl-container {
      background: #fff !important;
      border: 1px solid #333 !important;
      box-shadow: none !important;
    }
    .template-poster .nl-zine,
    .template-poster .nl-zine__num,
    .template-poster .nl-zine__link,
    .template-poster .nl-intro {
      box-shadow: none !important;
    }
    .template-poster .nl-zine { border: 1px solid #333 !important; }

    .nl-footer__partners img { box-shadow: none !important; }
  }
</style>
</head>
<body>

  <!-- Slim back link (screen only) -->
  <div class="nl-topbar no-print">
    <a href="blog.html" class="nl-back-link">→ חזרה לבלוג וחדשות</a>
  </div>

  <!-- Loading / error state -->
  <div id="nl-status" class="nl-status-container">
    <h2 class="pg-h2" id="status-title">טוען ניוזלטר...</h2>
    <p class="pg-p" id="status-text">מתחבר למקורות הנתונים לשחזור הגיליון השמור.</p>
  </div>

  <!-- Main newsletter (hidden until loaded) -->
  <article id="nl-content" class="nl-container" style="display: none;">

    <header class="nl-masthead">
      <a href="index.html" class="nl-logo">
        <img src="assets/logos/logo-full.png" alt="תיכון החממה" />
      </a>
      <div class="nl-issue">
        <span class="nl-issue__label" id="nl-lbl-issue"></span>
        <span class="nl-issue__date" id="nl-lbl-date"></span>
      </div>
    </header>

    <h1 class="nl-title" id="nl-val-title"></h1>

    <div class="nl-intro" id="nl-val-intro"></div>

    <section class="nl-posts" id="nl-posts-grid-container"></section>

    <!-- Print / Save as PDF — bottom of the content, screen only -->
    <div class="nl-print-row no-print">
      <button id="btn-print" class="nl-print-btn" type="button">הדפסה / שמירה כ־PDF</button>
    </div>

    <footer class="nl-footer">
      <div class="nl-footer__partners">
        <img src="assets/logos/partner-ministry-of-labor.png" alt="משרד העבודה" />
        <img src="assets/logos/partner-amal.png" alt="רשת עמל" />
        <img src="assets/logos/partner-hod-hasharon.png" alt="עיריית הוד השרון" />
      </div>
      <div class="nl-footer__info">
        תיכון החממה · עמל הוד השרון · טלפון: 09-7884549 · אימייל: <a href="mailto:info@chamama.org">info@chamama.org</a>
        <br />
        <a href="index.html" class="no-print">ביקור באתר בית הספר</a>
      </div>
    </footer>

  </article>

<script src="pages.js"></script>
<script>
  document.addEventListener("DOMContentLoaded", function () {
    const statusContainer = document.getElementById("nl-status");
    const statusTitle = document.getElementById("status-title");
    const statusText = document.getElementById("status-text");
    const contentContainer = document.getElementById("nl-content");

    const lblIssue = document.getElementById("nl-lbl-issue");
    const lblDate = document.getElementById("nl-lbl-date");
    const valTitle = document.getElementById("nl-val-title");
    const valIntro = document.getElementById("nl-val-intro");
    const postsGridContainer = document.getElementById("nl-posts-grid-container");

    const urlParams = new URLSearchParams(window.location.search);
    const newsletterId = urlParams.get("id");

    if (!newsletterId) {
      showError("הניוזלטר אינו קיים", "לא סופק מזהה ניוזלטר (id) בכתובת הדף. אנא ודאו שהקישור שקיבלתם תקין.");
      return;
    }

    // ─── Safety helpers ───
    function escapeHTML(str) {
      if (typeof str !== 'string') {
        return str === undefined || str === null ? '' : String(str);
      }
      return str
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#039;');
    }

    function safeURL(url) {
      if (typeof url !== 'string') {
        url = url === undefined || url === null ? '' : String(url);
      }
      const trimmed = url.trim();
      const lower = trimmed.toLowerCase();
      if (lower.startsWith('javascript:') || lower.startsWith('data:')) {
        return '';
      }
      return escapeHTML(trimmed);
    }

    function showError(title, message) {
      statusTitle.textContent = title;
      statusTitle.style.color = "var(--ch-terra)";
      statusText.textContent = message;
      statusContainer.style.display = "block";
      contentContainer.style.display = "none";
    }

    function formatDate(value) {
      if (!value) return '';
      const d = new Date(value);
      if (isNaN(d.getTime())) return '';
      return d.toLocaleDateString("he-IL", { year: "numeric", month: "long", day: "numeric" });
    }

    // ─── Data loading ───
    async function loadNewsletters() {
      try {
        const response = await fetch("/.netlify/functions/newsletters");
        if (!response.ok) throw new Error("Function failed");
        return await response.json();
      } catch (error) {
        console.warn("Falling back to local newsletters.json", error);
        const fallback = await fetch("data/newsletters.json");
        if (!fallback.ok) throw new Error("Fallback failed");
        return await fallback.json();
      }
    }

    async function loadPosts() {
      try {
        const response = await fetch("/.netlify/functions/posts");
        if (!response.ok) throw new Error("Function failed");
        return await response.json();
      } catch (error) {
        console.warn("Falling back to local posts.json", error);
        const fallback = await fetch("data/posts.json");
        if (!fallback.ok) throw new Error("Fallback failed");
        return await fallback.json();
      }
    }

    Promise.all([loadNewsletters(), loadPosts()])
      .then(([newsletters, posts]) => {
        const newsletter = newsletters.find(n => n.id === newsletterId && n.published === true);

        if (!newsletter) {
          showError("הניוזלטר לא נמצא", "הגיליון המבוקש לא קיים במערכת או שטרם פורסם לציבור.");
          return;
        }

        const activeTemplate = ['classic', 'magazine', 'poster', 'compact'].includes(newsletter.template)
          ? newsletter.template
          : 'classic';
        contentContainer.classList.add(`template-${activeTemplate}`);

        document.title = `${newsletter.title} — ניוזלטר תיכון החממה`;

        lblIssue.textContent = newsletter.issue ? newsletter.issue : "ניוזלטר";
        lblDate.textContent = formatDate(newsletter.date);
        valTitle.textContent = newsletter.title || "";
        valIntro.textContent = newsletter.intro || "";

        // Match referenced posts in the saved order
        const selectedPosts = [];
        if (Array.isArray(newsletter.post_slugs)) {
          newsletter.post_slugs.forEach(slug => {
            const found = posts.find(p => p.slug === slug);
            if (found) selectedPosts.push(found);
          });
        }

        if (selectedPosts.length === 0) {
          postsGridContainer.innerHTML = `<p class="nl-empty">לא נמצאו עדכונים או כתבות להצגה בגיליון זה.</p>`;
        } else {
          renderPostsLayout(selectedPosts, activeTemplate);
        }

        statusContainer.style.display = "none";
        contentContainer.style.display = "block";
      })
      .catch(error => {
        console.error("Error building newsletter page:", error);
        showError("שגיאה בטעינת הניוזלטר", "אירעה שגיאה תקשורתית במהלך שחזור נתוני הניוזלטר. אנא נסו לרענן את הדף.");
      });

    // ─── Post helpers ───
    function postData(post) {
      const typeHe = post.type ? escapeHTML(String(post.type)) : 'עדכון';
      return {
        title: escapeHTML(post.title),
        excerpt: escapeHTML(post.excerpt),
        dateStr: formatDate(post.date),
        url: `blog-post.html?slug=${safeURL(post.slug)}`,
        typeHe: typeHe,
        img: post.image ? safeURL(post.image) : ''
      };
    }

    function imgTag(d, cls) {
      if (!d.img) return '';
      return `<img src="${d.img}" alt="${d.title}" class="${cls}" loading="lazy" onerror="this.style.display='none'" />`;
    }

    function meta(d) {
      return d.dateStr ? `${d.typeHe} · ${d.dateStr}` : d.typeHe;
    }

    // ─── Template renderers ───
    function renderEditorial(posts) {
      return posts.map((post, i) => {
        const d = postData(post);
        const flip = i % 2 ? 'nl-art--flip' : '';
        const textOnly = d.img ? '' : 'nl-art--text';
        const media = d.img ? `<div class="nl-art__media">${imgTag(d, 'nl-art__img')}</div>` : '';
        return `
          <article class="nl-art ${flip} ${textOnly}">
            ${media}
            <div class="nl-art__text">
              <div class="nl-art__meta"><span>${d.typeHe}</span>${d.dateStr ? `<span>·</span><time>${d.dateStr}</time>` : ''}</div>
              <h2 class="nl-art__title">${d.title}</h2>
              <p class="nl-art__excerpt">${d.excerpt}</p>
              <a href="${d.url}" class="nl-art__link" target="_blank" rel="noopener">קראו את הכתבה המלאה ←</a>
            </div>
          </article>`;
      }).join('<hr class="nl-art__rule" />');
    }

    function renderMagazine(posts) {
      const h = postData(posts[0]);
      const heroText = h.img ? '' : 'nl-hero--text';
      let html = `
        <article class="nl-hero ${heroText}">
          ${h.img ? `<div class="nl-hero__media">${imgTag(h, 'nl-hero__img')}</div>` : ''}
          <div class="nl-hero__panel">
            <span class="nl-hero__kicker">כתבת השער</span>
            <h2 class="nl-hero__title">${h.title}</h2>
            <div class="nl-hero__meta">${meta(h)}</div>
            <p class="nl-hero__excerpt">${h.excerpt}</p>
            <a href="${h.url}" class="nl-hero__link" target="_blank" rel="noopener">לכתבה המלאה ←</a>
          </div>
        </article>`;

      const rest = posts.slice(1);
      if (rest.length) {
        html += `<div class="nl-mag-grid">${rest.map(p => {
          const d = postData(p);
          const textOnly = d.img ? '' : 'nl-mag-card--text';
          return `
            <article class="nl-mag-card ${textOnly}">
              ${d.img ? `<div class="nl-mag-card__media">${imgTag(d, 'nl-mag-card__img')}</div>` : ''}
              <div class="nl-mag-card__body">
                <div class="nl-mag-card__meta">${meta(d)}</div>
                <h3 class="nl-mag-card__title">${d.title}</h3>
                <p class="nl-mag-card__excerpt">${d.excerpt}</p>
                <a href="${d.url}" class="nl-mag-card__link" target="_blank" rel="noopener">קראו עוד ←</a>
              </div>
            </article>`;
        }).join('')}</div>`;
      }
      return html;
    }

    function renderChamama(posts) {
      return posts.map((post, i) => {
        const d = postData(post);
        const num = String(i + 1).padStart(2, '0');
        const textOnly = d.img ? '' : 'nl-zine--text';
        const media = d.img
          ? `<div class="nl-zine__media">${imgTag(d, 'nl-zine__img')}<span class="nl-zine__tag">${d.typeHe}</span></div>`
          : `<div class="nl-zine__tagrow"><span class="nl-zine__tag nl-zine__tag--static">${d.typeHe}</span></div>`;
        return `
          <article class="nl-zine ${textOnly}">
            <span class="nl-zine__num">${num}</span>
            ${media}
            <div class="nl-zine__body">
              ${d.dateStr ? `<div class="nl-zine__date">${d.dateStr}</div>` : ''}
              <h2 class="nl-zine__title">${d.title}</h2>
              <p class="nl-zine__excerpt">${d.excerpt}</p>
              <a href="${d.url}" class="nl-zine__link" target="_blank" rel="noopener">קראו עוד ←</a>
            </div>
          </article>`;
      }).join('');
    }

    function renderCompact(posts) {
      return posts.map(post => {
        const d = postData(post);
        const textOnly = d.img ? '' : 'nl-digest--text';
        return `
          <article class="nl-digest ${textOnly}">
            ${d.img ? `<div class="nl-digest__media">${imgTag(d, 'nl-digest__img')}</div>` : ''}
            <div class="nl-digest__body">
              <div class="nl-digest__meta">${meta(d)}</div>
              <h2 class="nl-digest__title">${d.title}</h2>
              <p class="nl-digest__excerpt">${d.excerpt}</p>
              <a href="${d.url}" class="nl-digest__link" target="_blank" rel="noopener">קישור לכתבה באתר ←</a>
            </div>
          </article>`;
      }).join('');
    }

    function renderPostsLayout(selectedPosts, template) {
      let html;
      if (template === 'magazine') {
        html = renderMagazine(selectedPosts);
      } else if (template === 'poster') {
        html = renderChamama(selectedPosts);
      } else if (template === 'compact') {
        html = renderCompact(selectedPosts);
      } else {
        html = renderEditorial(selectedPosts);
      }
      postsGridContainer.innerHTML = html;
    }

    // ─── Print / Save as PDF ───
    document.getElementById("btn-print").addEventListener("click", function () {
      window.print();
    });
  });
</script>
</body>
</html>
